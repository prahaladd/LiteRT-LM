<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteRT-LM.js Chat</title>
  
  <!-- PWA Assets & Mobile Headers -->
  <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">

  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: #151d30;
      --bg-chat: #0e1424;
      --bg-input: #070a12;
      --border: #24324f;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --teal: #00c99e;
      --teal-dark: #0b705d;
      --blue: #3b82f6;
      --blue-dark: #1d4ed8;
      --slate-bubble-user: #1e293b;
      --slate-bubble-bot: #151e33;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      overscroll-behavior: none; /* Completely lock page rubber-banding bounces on Apple/touch viewports! */
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      margin: 0;
      color: #ffffff;
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: ui-monospace, monospace;
    }

    .header-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.15s;
    }

    .header-link:hover {
      color: var(--teal);
    }

    /* Centralized Web App Component Shell */
    litert-lm-chat-app {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Layout wrapper */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    litert-sidebar {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0; /* Prevent flex bounds overflow and vertical collapses */
      width: 100%;
      overflow: hidden;
      gap: 12px;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background-color: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
      overflow-y: hidden;
      box-sizing: border-box;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--teal);
      margin: 0 0 12px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="number"] {
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus {
      border-color: var(--teal);
    }

    .btn {
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--teal);
      color: #0b0f19;
    }

    .btn-primary:hover {
      background-color: #00c99ecc;
    }

    .btn-stop {
      background-color: #ef4444 !important;
      color: #ffffff !important;
    }

    .btn-stop:hover {
      background-color: #dc2626 !important;
    }

    .btn-secondary {
      background-color: #1e293b;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: #334155;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status-card {
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
    }

    .status-header {
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-indicator {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      background-color: #64748b; /* default grey */
    }

    .status-indicator.loading { background-color: #eab308; /* yellow */ animation: pulse 1.5s infinite; }
    .status-indicator.ready { background-color: var(--teal); }
    .status-indicator.error { background-color: #ef4444; }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    .status-text {
      color: var(--text-muted);
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }

    .metrics-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
    }

    .metric-val {
      color: var(--text);
      font-weight: 700;
    }

    /* Chat Panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-chat);
      overflow: hidden;
    }

    litert-chat-window {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0; /* Prevent flex bounds overflow and vertical collapses */
      width: 100%;
      overflow: hidden;
    }

    /* Chat Messages Box */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain; /* Contain internal scrolling within messages timeline limits */
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    litert-chat-bubble {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Chat Bubbles */
    .message-bubble {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9375rem;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bubble.user {
      align-self: flex-end;
      background-color: var(--slate-bubble-user);
      border: 1px solid var(--border);
      border-bottom-right-radius: 2px;
    }

    .message-bubble.assistant {
      align-self: flex-start;
      background-color: var(--slate-bubble-bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    .message-sender {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .message-sender.user { color: var(--blue); }
    .message-sender.assistant { color: var(--teal); }

    /* CoT Thought Process Blocks */
    .thought-details {
      background-color: rgba(255, 255, 255, 0.03);
      border-left: 3px solid var(--teal);
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .thought-summary {
      font-size: 0.7rem;
      font-weight: bold;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      outline: none;
      user-select: none;
    }

    .thought-content {
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 8px;
    }

    .thought-content p {
      margin: 4px 0;
      font-style: italic;
    }

    .message-user-text {
      white-space: pre-wrap; /* Retain custom user text formatting linebreaks on raw text only */
    }
    
    .message-content {
      white-space: normal; /* Let HTML layouts and spacing handle margins naturally */
    }

    .message-bubble {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      padding-top: 6px;
      justify-content: flex-end;
      align-items: center; /* Align copy and retry vertically with stats */
    }

    .btn-action {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center; /* Center content inside fixed container */
      width: 58px; /* Locked width prevents right-side layout expansions when changing texts */
      height: 20px;
      box-sizing: border-box;
      padding: 0;
      border-radius: 4px;
      transition: color 0.15s, background-color 0.15s;
    }

    .btn-action:hover {
      color: var(--teal);
      background-color: var(--bg-input);
    }

    .message-content code {
      font-family: ui-monospace, monospace;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 0.875em;
    }

    .message-content pre {
      font-family: ui-monospace, monospace;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.875rem;
      margin: 8px 0;
    }

    /* Styled Code Blocks & Previews */
    .code-container {
      margin-top: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background-color: var(--bg-input);
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--slate-bubble-user);
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.2;
    }

    .code-lang {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-preview-code {
      background-color: var(--teal);
      color: #0b0f19;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.15s;
      line-height: 1;
    }

    .btn-preview-code:hover {
      background-color: #00c99ed9;
    }

    .btn-copy-code {
      background-color: #1e293b;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      line-height: 1;
    }

    .btn-copy-code:hover {
      background-color: var(--teal);
      color: var(--bg-dark) !important;
    }

    .code-content-pre {
      margin: 0;
      padding: 16px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #cbd5e1;
      background-color: transparent !important;
      border-radius: 0 !important;
    }

    /* HTML Preview Overlay */
    .preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--bg-dark);
      z-index: 9999;
      display: flex;
      flex-direction: column;
    }

    .preview-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #ffffff;
    }

    .btn-close-preview {
      position: absolute;
      top: 16px;
      right: 24px;
      background-color: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      z-index: 10000;
    }

    .btn-close-preview:hover {
      background-color: rgba(30, 41, 59, 0.9);
      border-color: var(--teal);
    }

    /* Quick starters */
    .starters-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 24px 8px 24px;
      background-color: var(--bg-chat);
      flex-shrink: 0;
    }

    .btn-starter {
      background-color: rgba(30, 41, 59, 0.4);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-starter:hover:not(:disabled) {
      background-color: var(--border);
      color: var(--text);
    }

    /* Input Area */
    .chat-input-container {
      padding: 16px 24px 24px 24px;
      background-color: var(--bg-chat);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-textarea-wrapper {
      flex: 1;
      position: relative;
    }

    textarea {
      display: block;
      width: 100%;
      box-sizing: border-box;
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.9375rem;
      resize: none;
      height: 48px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      line-height: 1.4;
    }

    textarea:focus {
      border-color: var(--teal);
    }

    .btn-input-send {
      height: 40px;
      width: 80px;
      box-sizing: border-box;
      padding: 0;
      flex-shrink: 0;
      font-size: 0.8rem;
      border-radius: 8px;
      margin-bottom: 4px; /* Beautiful visual baseline offset */
    }

    textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Saved Conversations List */
    .conversations-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain; /* Contain internal scrolling within sidebar limits */
      margin-top: 4px;
      padding: 0;
      background: none;
      border: none;
    }

    /* Micro-Stats details displayed contextually under assistant response turns */
    .message-stats {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: ui-monospace, monospace;
      display: inline-flex;
      align-items: center;
      gap: 12px; /* Increased gap to restore spacious margins without dot separators */
      margin-right: auto; /* flex-push to the far left of the actions container */
      opacity: 0.65;
      user-select: none;
    }

    .message-stats b {
      color: var(--teal);
      white-space: nowrap; /* Prevent line breaks only between value numbers and units! */
    }

    /* Edge-to-edge Anchored Sidebar Footer with upwards box shadow */
    .sidebar-status-footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 10;
      box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.45);
      background-color: var(--bg-card);
      margin-left: -16px;
      margin-right: -16px;
      margin-bottom: -16px;
      padding-top: 12px;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 16px;
    }
    .conv-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-muted);
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
      border: 1px solid transparent;
    }
    .conv-item:not(.active):hover {
      background-color: var(--bg-input);
      color: var(--text);
    }
    .conv-item.active {
      background-color: var(--teal);
      color: var(--bg-dark) !important;
      font-weight: bold;
    }
    .conv-item.active:hover {
      background-color: var(--teal) !important;
      color: var(--bg-dark) !important;
      cursor: default;
    }
    .new-chat-item {
      color: var(--teal) !important;
      border: 1px dashed var(--teal);
      margin-bottom: 6px;
      font-weight: bold;
    }
    .new-chat-item:not(.active):hover {
      background-color: rgba(45, 212, 191, 0.08) !important;
      color: var(--teal) !important;
    }
    .conv-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 6px;
    }
    .btn-delete-conv {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s;
    }
    .btn-delete-conv:hover {
      opacity: 1;
      color: #ef4444 !important;
    }

    /* Collapsible Sections */
    .collapsible-header {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: color 0.15s;
    }
    .collapsible-header:hover {
      color: var(--teal);
    }
    .collapsible-content {
      transition: max-height 0.2s ease-out, opacity 0.2s ease-out;
      overflow: hidden;
    }
    .collapsible-content.collapsed {
      max-height: 0 !important;
      opacity: 0;
      margin-top: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      pointer-events: none;
      border: none !important;
    }
    .collapse-icon {
      font-size: 0.65rem;
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .collapse-icon.collapsed {
      transform: rotate(-90deg);
    }

    /* Responsive tweaks */
    .btn-toggle-sidebar {
      display: none; /* Hidden on desktop */
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      transition: background-color 0.15s;
      line-height: 1;
    }
    .btn-toggle-sidebar:hover {
      background-color: var(--border);
    }

    .btn-dismiss-right-drawer {
      display: block;
      background: none;
      border: 1px solid rgba(0, 201, 158, 0.3);
      color: var(--teal);
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: bold;
      padding: 4px 10px;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      font-family: inherit;
      outline: none;
    }

    .btn-dismiss-right-drawer:hover {
      background-color: rgba(0, 201, 158, 0.08);
      border-color: var(--teal);
      color: #ffffff;
    }

    .btn-dismiss-sidebar {
      display: none; /* Hidden on desktop */
    }

    .clear-all-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.65rem;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background-color 0.15s;
    }

    .clear-all-btn:hover {
      background-color: rgba(239, 68, 68, 0.1);
    }

    /* Collapsible Learn More Drawer Sidebar (Slides from Right!) */
    .sidebar-right {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 480px; /* Cap width on desktop/tablets to let REPL code render perfectly */
      height: 100vh;
      z-index: 10000;
      background-color: var(--bg-card);
      border-left: 1px solid var(--border);
      padding: 24px 20px;
      box-sizing: border-box;
      transform: translateX(100%); /* Closed by default */
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow-y: hidden;
      box-shadow: none;
    }

    .sidebar-right.open {
      transform: translateX(0); /* Slide-in */
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.65); /* Drop shadow on left side */
    }

    /* Direct flex column mappings for litert-learn-more */
    litert-learn-more {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
      overflow: hidden;
    }

    /* Right backdrop overlay */
    .sidebar-right-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.65);
      z-index: 9999;
      backdrop-filter: blur(4px);
      overscroll-behavior: none;
    }
    
    .sidebar-right-overlay.open {
      display: block;
    }

    /* Header toggle button styling */
    .btn-toggle-learn-more {
      background: rgba(0, 201, 158, 0.04);
      border: 1px solid var(--teal);
      color: #ffffff;
